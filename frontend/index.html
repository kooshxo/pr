<!DOCTYPE html>
<html>

<head>

<title>Google Classroom</title>

<link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

#topbar{
display:flex;
padding:10px;
background:#111;
gap:10px;
align-items:center;
}

button{
padding:8px 14px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#555;
}

input{
flex:1;
padding:8px;
background:#000;
color:white;
border:none;
outline:none;
}

button{
padding:8px 14px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

iframe{
width:100%;
height:calc(100vh - 50px);
border:none;
background:white;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:40px;
height:40px;
border:4px solid #333;
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

#loading.show{
display:block;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

</style>

</head>

<body>

<div id="topbar">

<button onclick="back()">⬅</button>
<button onclick="forward()">➡</button>
<button onclick="reload()">⟳</button>

<input id="url" placeholder="Search or enter website">

<button onclick="go()">Go</button>

</div>

<iframe id="frame"></iframe>

<div id="loading"></div>

<script src="script.js"></script>

<script src="cloak.js"></script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Google Classroom</title>

<link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
overflow:hidden;
}

#topbar{
display:flex;
align-items:center;
background:#111;
padding:8px;
gap:8px;
}

button{
background:#1a1a1a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

#urlbar{
flex:1;
background:#000;
border:none;
color:white;
padding:8px;
border-radius:6px;
font-size:14px;
outline:none;
}

#tabs{
display:flex;
background:#0f0f0f;
padding:4px;
gap:6px;
}

.tab{
background:#1a1a1a;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.tab.active{
background:#333;
}

#viewer{
width:100%;
height:calc(100vh - 80px);
border:none;
background:white;
}

</style>

</head>

<body>

<div id="tabs">
<div class="tab active">Classroom</div>
</div>

<div id="topbar">

<button onclick="back()">⬅</button>
<button onclick="forward()">➡</button>
<button onclick="reload()">⟳</button>

<input id="urlbar" placeholder="Search or enter website">

<button onclick="go()">Go</button>

</div>

<iframe id="viewer"></iframe>

<script>

const iframe=document.getElementById("viewer")
const urlbar=document.getElementById("urlbar")

let historyStack=[]
let historyIndex=-1

function formatInput(input){

if(input.includes(".") && !input.includes(" ")){
if(!input.startsWith("http")){
return "https://"+input
}
return input
}

return "https://www.google.com/search?q="+encodeURIComponent(input)

}

function go(){

let value=urlbar.value.trim()
if(!value)return

let url=formatInput(value)

load(url)

}

function load(url){

iframe.src="/api/proxy?url="+encodeURIComponent(url)

historyStack=historyStack.slice(0,historyIndex+1)

historyStack.push(url)
historyIndex++

}

function back(){

if(historyIndex>0){

historyIndex--

iframe.src="/api/proxy?url="+encodeURIComponent(historyStack[historyIndex])
urlbar.value=historyStack[historyIndex]

}

}

function forward(){

if(historyIndex<historyStack.length-1){

historyIndex++

iframe.src="/api/proxy?url="+encodeURIComponent(historyStack[historyIndex])
urlbar.value=historyStack[historyIndex]

}

}

function reload(){

if(historyIndex>=0){
iframe.src="/api/proxy?url="+encodeURIComponent(historyStack[historyIndex])
}

}

urlbar.addEventListener("keydown",(e)=>{
if(e.key==="Enter")go()
})

</script>
<script src="cloak.js"></script>
</body>

</html>
